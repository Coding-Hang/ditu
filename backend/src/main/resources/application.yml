server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ditu-agent
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ditu}
    username: ${SPRING_DATASOURCE_USERNAME:ditu}
    password: ${SPRING_DATASOURCE_PASSWORD:ditu}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

ditu:
  auth:
    token-secret: ${DITU_AUTH_TOKEN_SECRET:change-me-to-a-long-production-secret}
    access-token-seconds: ${DITU_ACCESS_TOKEN_SECONDS:7200}
    refresh-token-seconds: ${DITU_REFRESH_TOKEN_SECONDS:604800}
  crypto:
    secret: ${DITU_CRYPTO_SECRET:local-dev-crypto-secret-change-me}
  model:
    default-base-url: ${DITU_DEFAULT_MODEL_BASE_URL:http://localhost:11434/v1}
    default-model-name: ${DITU_DEFAULT_MODEL_NAME:ditu-default}
    default-auth-type: ${DITU_DEFAULT_MODEL_AUTH_TYPE:NONE}
    default-api-key: ${DITU_DEFAULT_MODEL_API_KEY:}
  embedding:
    model: ${DITU_EMBEDDING_MODEL:mock-embedding}
    dimension: ${DITU_EMBEDDING_DIMENSION:1536}
  file-storage-root: ${DITU_FILE_STORAGE_ROOT:./data/uploads}
